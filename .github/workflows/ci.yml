name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint / type-check / architecture / tests + audit + secret-scanning +
  # dependency-review are consolidated into the org gold-standard
  # python-app-ci meta-reusable (package-manager: uv). It composes
  # python-ci + python-audit + gitleaks + dependency-review (+ opt-in
  # codeql/build/zizmor/scorecard) so this repo has one CI call site and
  # the pinned action versions are maintained centrally in netresearch/.github.
  app-ci:
    uses: netresearch/.github/.github/workflows/python-app-ci.yml@main
    permissions:
      actions: read
      contents: read
      security-events: write
      pull-requests: write
      id-token: write
    with:
      package-manager: uv
      python-versions: '["3.14"]'
      # tests/conftest.py auto-loads .env.test, which is not tracked in git.
      # Export the same surface via $GITHUB_ENV (persists to the pytest step)
      # so client constructors that demand env-supplied values work in CI.
      install-cmd: |
        set -e
        uv sync --frozen --extra test --extra dev
        {
          echo "J2O_TEST_MODE=true"
          echo "J2O_USE_MOCK_APIS=true"
          echo "J2O_OPENPROJECT_SERVER=openproject.local"
          echo "J2O_OPENPROJECT_CONTAINER=openproject-web-1"
          echo "J2O_OPENPROJECT_USER=root"
          echo "J2O_OPENPROJECT_URL=https://openproject.local"
          echo "J2O_OPENPROJECT_API_KEY=test_api_key"
          echo "J2O_OPENPROJECT_TMUX_SESSION_NAME=rails_console"
          echo "J2O_JIRA_URL=https://jira.local"
          echo "J2O_JIRA_USERNAME=testuser"
          echo "J2O_JIRA_API_TOKEN=test_token"
          echo "J2O_SSH_HOST=localhost"
          echo "J2O_SSH_USER=root"
          echo "J2O_SSL_VERIFY=false"
        } >> "$GITHUB_ENV"
      run-lint: true
      # ruff lint + format check, plus the import-linter architecture check
      # folded in (previously a separate python-ci call site).
      lint-cmd: uv run ruff check --no-fix . && uv run ruff format --check . && uv run lint-imports
      run-type-check: true
      type-check-cmd: uv run mypy
      run-tests: true
      test-cmd: uv run pytest --cov=src --cov-report=xml --cov-report=term -n auto
      coverage-upload: true
      # Internal application: no distribution build / PyPI publish.
      enable-build: false
      # pip-audit only; bandit flags pre-existing findings — enable separately
      # once triaged (matches the prior security.yml audit call).
      run-bandit: false
      # CodeQL default setup is enabled on this repo; keep the advanced job
      # off to avoid the default-vs-advanced conflict.
      enable-codeql: false
      enable-gitleaks: true
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # Containerised suite: buildx + make, no Python setup — stays inline.
  # Job ID kept as container-tests to match the branch-protection check.
  container-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Run containerised test suite
        run: make container-test
